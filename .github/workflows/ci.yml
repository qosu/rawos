name: CI

on:
  push:
    branches: ["master", "main"]
  pull_request:
    branches: ["master", "main"]

jobs:
  test:
    name: Test suite (Python 3.12)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests (portable subset)
        # Substrate tests that require root, systemd, Docker daemon, or bare-metal
        # kernel features (Landlock, BPF LSM, /etc/systemd/system/) are excluded.
        # They pass on the production host (make test → 1331 passed) but cannot
        # run in a sandboxed CI runner. See AGENTS.md for the full substrate list.
        run: |
          python -m pytest tests/ \
            --ignore=tests/load_test \
            --ignore=tests/test_anomaly_verifier.py \
            --ignore=tests/test_api.py \
            --ignore=tests/test_arch_linux_shell_policy.py \
            --ignore=tests/test_audit_chain.py \
            --ignore=tests/test_autonomy_auto_apply.py \
            --ignore=tests/test_autonomy_scan_wiring.py \
            --ignore=tests/test_billing_stripe.py \
            --ignore=tests/test_context_routes.py \
            --ignore=tests/test_intent_resumable.py \
            --ignore=tests/test_kernel_perception.py \
            --ignore=tests/test_landlock.py \
            --ignore=tests/test_phase2.py \
            --ignore=tests/test_phase3.py \
            --ignore=tests/test_reversible_apply.py \
            --ignore=tests/test_reversible_apply_canary.py \
            --ignore=tests/test_sandbox_isolation.py \
            --ignore=tests/test_self_probe.py \
            --ignore=tests/test_self_reload.py \
            --ignore=tests/test_server_scan_isolation.py \
            --ignore=tests/test_session_digest.py \
            --ignore=tests/test_tier_enforcement.py \
            --ignore=tests/test_track_record_io.py \
            --ignore=tests/test_venv_operator.py \
            -q \
            --tb=short
        env:
          # CI uses stub values; real credentials not required for unit tests
          RAWOS_ENV: test
          JWT_SECRET: ci-stub-secret-not-real
          LLM_API_KEY: ci-stub-not-real
          LLM_BASE_URL: https://stub.invalid
          LLM_AGENT_MODEL: stub-model
          PORT: "8002"

  lint:
    name: Lint (advisory)
    runs-on: ubuntu-latest
    # Lint is advisory: pre-existing violations in the codebase are tracked
    # but do not block merges. New code should be violation-free.
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install linter
        run: pip install ruff

      - name: Ruff check
        run: ruff check rawos/ --select E,F,W --ignore E501
