name: CI

on:
  push:
    branches: ["master", "main"]
  pull_request:
    branches: ["master", "main"]

jobs:
  test:
    name: Test suite (Python 3.12)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: |
          python -m pytest tests/ \
            --ignore=tests/load_test \
            -q \
            --tb=short
        env:
          # CI uses stub values; real credentials not required for unit tests
          RAWOS_ENV: test
          JWT_SECRET: ci-stub-secret-not-real
          LLM_API_KEY: ci-stub-not-real
          LLM_BASE_URL: https://stub.invalid
          LLM_AGENT_MODEL: stub-model
          PORT: "8002"

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install linter
        run: pip install ruff

      - name: Ruff check
        run: ruff check rawos/ --select E,F,W --ignore E501
